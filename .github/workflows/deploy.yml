name: Deploy to GitHub Pages

# Builds the SCSS/JS and publishes the site on every push to master.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Assemble site (exclude tooling/source)
        run: |
          mkdir _site
          rsync -a --exclude='_site' \
                   --exclude='node_modules' \
                   --exclude='.git' \
                   --exclude='.github' \
                   --exclude='assets/scss' \
                   ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
